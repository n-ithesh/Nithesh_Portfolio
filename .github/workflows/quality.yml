name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Check file sizes
      run: |
        echo "📊 File Size Report"
        echo "===================="
        du -sh * | sort -hr
        echo ""
        echo "Total size:"
        du -sh .

    - name: Check for large files
      run: |
        echo "🔍 Checking for files larger than 5MB..."
        find . -type f -size +5M -not -path "./.git/*" || echo "✓ No large files found"
